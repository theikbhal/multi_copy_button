<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="popup-container">
    <header class="header">
      <div class="logo-area">
        <img src="icons/icon32.png" alt="Logo" class="logo-img">
        <span class="title-text">Only Copy Buttons</span>
      </div>
      <div class="tag">Lite</div>
    </header>

    <main class="main-content">
      <button id="toggle-btn" class="btn btn-primary">
        <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
        </svg>
        Toggle Dashboard
      </button>

      <div class="section-title">Snippets Statistics</div>
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-value" id="stat-total">0</div>
          <div class="stat-label">Total Buttons</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="stat-floating">0</div>
          <div class="stat-label">Active Floaters</div>
        </div>
      </div>

      <div class="section-title">Data Backup</div>
      <div class="actions-row">
        <button id="export-btn" class="btn btn-secondary">
          <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path>
          </svg>
          Export JSON
        </button>
        
        <label for="import-file" class="btn btn-secondary label-btn">
          <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path>
          </svg>
          Import JSON
        </label>
        <input type="file" id="import-file" accept=".json" style="display: none;">
      </div>
      <div class="import-status" id="import-status"></div>
    </main>

    <footer class="footer">
      <div class="shortcut-info">
        Press <span class="shortcut-key">Cmd + Shift + Y</span> or <span class="shortcut-key">Ctrl + Shift + Y</span> to toggle.
      </div>
    </footer>
  </div>
  <script src="popup.js"></script>
</body>
</html>
